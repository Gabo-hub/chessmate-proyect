<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <radialGradient id="sky" cx="50%" cy="50%" r="75%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#121b2d" />
      <stop offset="50%" stop-color="#0a0f1d" />
      <stop offset="100%" stop-color="#04060c" />
    </radialGradient>
    <!-- Soft golden nebula glow -->
    <radialGradient id="glow" cx="50%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#DAA520" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#04060c" stop-opacity="0" />
    </radialGradient>
    <!-- Greek meander border pattern -->
    <pattern id="greek-border" width="40" height="20" patternUnits="userSpaceOnUse">
      <path d="M 0 10 L 15 10 L 15 5 L 25 5 L 25 15 L 10 15 L 10 0 L 30 0 L 30 20 L 5 20 L 5 10" 
            fill="none" stroke="#DAA520" stroke-width="1.5" stroke-opacity="0.18" />
    </pattern>
  </defs>
  <!-- Background base -->
  <rect width="1920" height="1080" fill="url(#sky)" />
  <rect width="1920" height="1080" fill="url(#glow)" />
  
  <!-- Greek border pattern along top and bottom -->
  <rect x="0" y="20" width="1920" height="20" fill="url(#greek-border)" />
  <rect x="0" y="1040" width="1920" height="20" fill="url(#greek-border)" />

  <!-- Elegant subtle background vector: Central Greek shield medallion -->
  <circle cx="960" cy="540" r="380" fill="none" stroke="#DAA520" stroke-width="1" stroke-opacity="0.08" stroke-dasharray="5 5" />
  <circle cx="960" cy="540" r="370" fill="none" stroke="#DAA520" stroke-width="2" stroke-opacity="0.06" />
  <circle cx="960" cy="540" r="340" fill="none" stroke="#DAA520" stroke-width="1" stroke-opacity="0.04" />
  
  <!-- Medallion cross axes -->
  <path d="M 960 170 L 960 910 M 590 540 L 1330 540" stroke="#DAA520" stroke-width="0.5" stroke-opacity="0.06" />
  
  <!-- Celestial star/constellation dots -->
  <g stroke="rgba(255,215,0,0.08)" stroke-width="0.8" fill="rgba(255,215,0,0.3)">
    <!-- Constellation 1 (Top Left) -->
    <polyline points="150,150 220,120 280,180 340,140" fill="none" />
    <circle cx="150" cy="150" r="3" />
    <circle cx="220" cy="120" r="2" />
    <circle cx="280" cy="180" r="3" />
    <circle cx="340" cy="140" r="4" fill="rgba(255,255,255,0.4)" />
    
    <!-- Constellation 2 (Top Right) -->
    <polyline points="1600,100 1670,170 1750,150 1780,240" fill="none" />
    <circle cx="1600" cy="100" r="2.5" />
    <circle cx="1670" cy="170" r="4" fill="rgba(255,255,255,0.4)" />
    <circle cx="1750" cy="150" r="2" />
    <circle cx="1780" cy="240" r="3.5" />
    
    <!-- Constellation 3 (Bottom Left) -->
    <polyline points="200,850 250,920 320,880 390,940" fill="none" />
    <circle cx="200" cy="850" r="3" />
    <circle cx="250" cy="920" r="2" />
    <circle cx="320" cy="880" r="3.5" />
    <circle cx="390" cy="940" r="2.5" />

    <!-- Constellation 4 (Bottom Right) -->
    <polyline points="1650,880 1720,830 1790,890 1840,820" fill="none" />
    <circle cx="1650" cy="880" r="3.5" />
    <circle cx="1720" cy="830" r="2" />
    <circle cx="1790" cy="890" r="4" fill="rgba(255,255,255,0.4)" />
    <circle cx="1840" cy="820" r="2.5" />
  </g>
</svg>